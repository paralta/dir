name: Dir demo

on:
  workflow_call:
    inputs:
      dir-apiserver-image:
        required: true
        type: string
        default: "ghcr.io/agntcy/dir-apiserver:latest"
      network:
        required: true
        type: boolean
        default: false

jobs:
  bootstrap:
    name: Bootstrap Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.12.0
        with:
          version: v0.24.0
          cluster_name: dir-demo

      - name: Load image into Kind
        run: |
          kind load docker-image ${{ inputs.dir-apiserver-image }} --name dir-demo

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy Helm Chart
        run: |
          helm dependency build 
          helm upgrade dir install/charts/dir -f install/charts/dir/values.yaml \
            --set apiserver.image.tag="{{ .IMAGE_TAG }}" \
            --namespace "default" \
            --create-namespace \
            --install \
            --wait \
            --wait-for-jobs \
            --timeout "15m"

      # TODO if network is true, deploy another server

  build:
    name: Build Command
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - name: Run build command
        run: |
          echo "Running dir build command"

  push:
    name: Push Command
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run push command
        run: |
          echo "Running dir push command"

  publish:
    name: Publish Command
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Run publish command
        run: |
          echo "Running dir publish command"

  list:
    name: List Command
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Run list command
        run: |
          echo "Running dir list command"

  unpublish:
    name: Unpublish Command
    runs-on: ubuntu-latest
    needs: list
    steps:
      - name: Run unpublish command
        run: |
          echo "Running dir unpublish command"

  delete:
    name: Delete Command
    runs-on: ubuntu-latest
    needs: unpublish
    steps:
      - name: Run delete command
        run: |
          echo "Running dir delete command"